<section class="base-table">
  <header
    *ngIf="title || subtitle || searchable || showAdd"
    class="table-header"
  >
    <div>
      <h2 *ngIf="title">{{ title }}</h2>
      <p *ngIf="subtitle">{{ subtitle }}</p>
    </div>

    <div class="table-tools">
      <label *ngIf="searchable" class="search-box">
        <app-fa-icon name="search"></app-fa-icon>
        <input
          type="search"
          [ngModel]="searchTerm"
          (ngModelChange)="onSearchChange($event)"
          [placeholder]="searchPlaceholder"
          aria-label="جستجوی جدول"
        />
      </label>

      <button
        *ngIf="showAdd"
        class="table-action add"
        type="button"
        (click)="addClick.emit()"
      >
        <app-fa-icon name="plus"></app-fa-icon>
        {{ addLabel }}
      </button>
    </div>
  </header>

  <div class="table-shell" [class.loading]="loading">
    <table>
      <thead>
        <tr>
          <th *ngFor="let column of columns" scope="col">
            {{ column.label }}
          </th>
          <th *ngIf="actionItems.length" scope="col">عملیات</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of visibleRows" [hidden]="loading">
          <td
            *ngFor="let column of columns"
            [attr.data-label]="column.label"
          >
            <span
              [class]="
                column.badge ? 'cell-badge ' + column.badge(row) : ''
              "
            >
              {{ getCellValue(row, column) }}
            </span>
          </td>
          <td *ngIf="actionItems.length" data-label="عملیات">
            <div class="row-actions">
              <ng-container *ngFor="let item of actionItems">
                <button
                  *ngIf="isActionVisible(item, row)"
                  class="table-action"
                  [class.primary]="item.tone === 'primary'"
                  [class.danger]="item.tone === 'danger'"
                  type="button"
                  [disabled]="isActionDisabled(item, row)"
                  (click)="emitAction(item, row)"
                >
                  <app-fa-icon
                    *ngIf="item.icon"
                    [name]="item.icon"
                  ></app-fa-icon>
                  {{ item.label }}
                </button>
              </ng-container>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="!loading && !visibleRows.length" class="empty-table">
      {{ emptyText }}
    </div>

    <div *ngIf="loading" class="table-loading">
      در حال دریافت اطلاعات...
    </div>
  </div>

  <nav
    *ngIf="showPagination"
    class="table-pagination"
    aria-label="صفحه‌بندی جدول"
  >
    <button
      type="button"
      (click)="previousPage()"
      [disabled]="currentPage <= 1"
    >
      قبلی
    </button>
    <span>صفحه {{ currentPage }} از {{ resolvedTotalPages }}</span>
    <button
      type="button"
      (click)="nextPage()"
      [disabled]="currentPage >= resolvedTotalPages"
    >
      بعدی
    </button>
  </nav>
</section>
