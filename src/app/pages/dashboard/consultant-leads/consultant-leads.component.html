<section>
  <header>
    <p>داشبورد مدیر</p>
    <h1>لیدهای اختصاص داده‌شده</h1>
    <p>شناسه مشاور: {{ consultantId }}</p>
    <a routerLink="/dashboard/consultants">بازگشت به مشاوران</a>
  </header>

  <app-table *ngIf="leads.length; else noLeads" [columns]="columns" [data]="leads"></app-table>
  <ng-template #noLeads>
    <app-empty-state title="لیدی اختصاص داده نشده است" description="این مشاور هنوز لید اختصاص داده‌شده ندارد."></app-empty-state>
  </ng-template>
</section>
