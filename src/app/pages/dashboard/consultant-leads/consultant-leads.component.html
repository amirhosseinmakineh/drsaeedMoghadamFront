<section class="admin-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Admin Dashboard</p>
      <h1>Consultant Assigned Leads</h1>
      <p>Consultant ID: {{ consultantId }}</p>
    </div>
    <a routerLink="/dashboard/consultants">Back to Consultants</a>
  </header>

  <app-table *ngIf="leads.length; else noLeads" [columns]="columns" [data]="leads"></app-table>
  <ng-template #noLeads>
    <app-empty-state title="No assigned leads" description="This consultant has no assigned leads yet."></app-empty-state>
  </ng-template>
</section>
