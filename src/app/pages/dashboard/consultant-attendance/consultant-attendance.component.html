<section>
  <header>
    <p>داشبورد مدیر</p>
    <h1>حضور و غیاب مشاور</h1>
    <p>شناسه مشاور: {{ consultantId }}</p>
    <a routerLink="/dashboard/consultants">بازگشت به مشاوران</a>
  </header>

  <app-table *ngIf="attendanceItems.length; else noAttendance" [columns]="columns" [data]="attendanceItems"></app-table>
  <ng-template #noAttendance>
    <app-empty-state title="سابقه حضور و غیاب وجود ندارد" description="برای این مشاور هنوز سابقه حضور و غیاب ثبت نشده است."></app-empty-state>
  </ng-template>
</section>
