<section class="admin-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Admin Dashboard</p>
      <h1>Consultant Management</h1>
    </div>
  </header>

  <app-table [columns]="columns" [data]="consultants" [customActions]="customActions" (actionClick)="handleAction($event)"></app-table>

  <app-base-dialog [(open)]="scoreDialogOpen" mode="create" title="Give Score" (confirmClick)="submitScore()">
    <form class="dialog-form">
      <p *ngIf="selectedConsultant">Consultant: {{ selectedConsultant.firstName }} {{ selectedConsultant.lastName }}</p>
      <label>Reason <select name="reason" [(ngModel)]="scoreForm.reason"><option value="ManagerReward">ManagerReward</option><option value="ManagerPenalty">ManagerPenalty</option></select></label>
      <label>Score Value <input type="number" name="scoreValue" [(ngModel)]="scoreForm.scoreValue" /></label>
      <label>Description <textarea name="description" [(ngModel)]="scoreForm.description" rows="3"></textarea></label>
    </form>
  </app-base-dialog>
</section>
