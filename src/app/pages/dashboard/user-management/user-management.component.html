<section>
  <header>
    <p>داشبورد مدیر</p>
    <h1>مدیریت کاربران</h1>
    <button type="button" (click)="openAddDialog()">افزودن کاربر</button>
  </header>

  <app-table *ngIf="users.length; else noUsers" [columns]="columns" [data]="users" [actions]="actions" (actionClick)="handleAction($event)"></app-table>
  <ng-template #noUsers>
    <app-empty-state title="کاربری یافت نشد" description="برای نمایش در این بخش، اولین کاربر را اضافه کنید." actionLabel="افزودن کاربر" (actionClick)="openAddDialog()"></app-empty-state>
  </ng-template>

  <app-base-dialog [(open)]="dialogOpen" [mode]="dialogMode" [title]="dialogTitle" (confirmClick)="confirmDialog()">
    <form *ngIf="dialogMode !== 'delete'">
      <label>نام <input name="firstName" [(ngModel)]="formUser.firstName" /></label>
      <label>نام خانوادگی <input name="lastName" [(ngModel)]="formUser.lastName" /></label>
      <label>شماره تلفن <input name="phoneNumber" [(ngModel)]="formUser.phoneNumber" /></label>
      <label>نقش <select name="role" [(ngModel)]="formUser.role"><option>مدیر</option><option>مشاور</option><option>بیمار</option></select></label>
      <label><input type="checkbox" name="isActive" [(ngModel)]="formUser.isActive" /> فعال است</label>
    </form>
    <p *ngIf="dialogMode === 'delete'">آیا از حذف {{ selectedUser?.firstName }} {{ selectedUser?.lastName }} مطمئن هستید؟</p>
  </app-base-dialog>
</section>
