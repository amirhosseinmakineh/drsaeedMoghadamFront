<section class="admin-panel">
  <header class="panel-heading">
    <div>
      <span>{{
        mode === "system" ? "همه سیستم" : "مشاور انتخاب‌شده"
      }}</span>
      <h2>{{ title }}</h2>
    </div>
    <button
      class="secondary-action compact"
      type="button"
      [disabled]="loading"
      (click)="load()"
    >
      بروزرسانی
    </button>
  </header>

  @if (mode === "system") {
    <div class="export-bar">
      <button
        class="export-action"
        type="button"
        [disabled]="exporting"
        (click)="exportLeadsReport()"
      >
        {{
          exporting
            ? "در حال آماده‌سازی..."
            : "دانلود گزارش اکسل لیدها"
        }}
      </button>
    </div>
  }

  <form class="filter-grid" (ngSubmit)="applyFilters()">
    <label>
      وضعیت لید
      <select
        [(ngModel)]="filters.leadAssignmentState"
        [ngModelOptions]="ngModelBlurOptions"
        name="leadAssignmentState"
      >
        @for (option of stateFilterOptions; track option.label) {
          <option [ngValue]="option.value">{{ option.label }}</option>
        }
      </select>
    </label>

    <label>
      نوع تخصیص
      <select
        [(ngModel)]="filters.leadAssignmentType"
        [ngModelOptions]="ngModelBlurOptions"
        name="leadAssignmentType"
      >
        @for (option of typeFilterOptions; track option.label) {
          <option [ngValue]="option.value">{{ option.label }}</option>
        }
      </select>
    </label>

    <label>
      موبایل
      <input
        [(ngModel)]="phoneFilter"
        [ngModelOptions]="ngModelBlurOptions"
        name="leadPhoneFilter"
        inputmode="numeric"
        placeholder="09xxxxxxxxx"
      />
    </label>

    <button class="primary-filter" type="submit">اعمال فیلتر</button>
  </form>

  @if (feedback) {
    <p class="feedback error">{{ feedback }}</p>
  }

  <app-base-table
    [columns]="columns"
    [data]="items"
    [showAdd]="false"
    [showEdit]="false"
    [showDelete]="false"
    [loading]="loading"
    [currentPage]="filters.pageNumber"
    [pageSize]="filters.pageSize"
    [totalCount]="totalCount"
    [totalPages]="totalPages"
    emptyText="لیدی برای نمایش وجود ندارد"
    (pageChange)="changePage($event)"
  ></app-base-table>
</section>
