name: PWA Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WEBPUSH_VAPID_PUBLIC_KEY: ${{ secrets.WEBPUSH_VAPID_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production PWA
        run: |
          if [ -n "$WEBPUSH_VAPID_PUBLIC_KEY" ]; then
            export REQUIRE_WEBPUSH_CONFIG=true
            npm run build
          else
            echo "Web Push secrets not configured in GitHub — running smoke build"
            npm run build:local
          fi

      - name: Validate PWA artifacts
        run: npm run validate:pwa
