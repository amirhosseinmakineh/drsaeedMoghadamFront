[build]
command = "npm run build"
publish = "dist/demo/browser"

# Web Push (VAPID) requires these environment variables in
# Netlify → Site configuration → Environment variables (Build scope):
#   WEBPUSH_VAPID_PUBLIC_KEY
# Optional override:
#   API_BASE_URL (defaults to production backend)
#
# Backend must also have WEBPUSH_VAPID_PUBLIC_KEY, WEBPUSH_VAPID_PRIVATE_KEY,
# and WEBPUSH_VAPID_SUBJECT configured at runtime.

[build.environment]
NODE_VERSION = "20"
REQUIRE_WEBPUSH_CONFIG = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
